name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006" --sdk_root=$ANDROID_SDK_ROOT

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Patch build.gradle — fix duplicate .so conflicts
        run: |
          python3 - <<'EOF'
          import re
          path = "android/app/build.gradle"
          patch = """
              packagingOptions {
                  pickFirst "**/libc++_shared.so"
                  pickFirst "**/libfbjni.so"
                  pickFirst "**/libwebrtc.so"
                  pickFirst "**/libjsc.so"
              }
          """
          content = open(path).read()
          if "pickFirst" not in content:
              content = content.replace("android {", "android {" + patch, 1)
              open(path, "w").write(content)
              print("Patched build.gradle")
          else:
              print("Already patched")
          EOF

      - name: Generate release keystore
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=YapFamily,O=YapFamily,L=SG,S=SG,C=SG"

      - name: Build release APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=release \
            -Pandroid.injected.signing.key.password=android
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yap-family-companion-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
